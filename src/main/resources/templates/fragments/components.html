<img th:fragment="series-poster (source, size)" th:if="${source.image != null}" th:with="imgUrl=${@cloudinaryService.fetchPoster('https://artworks.thetvdb.com' + source.image, size)}" th:src="${imgUrl}" class="object-contain rounded-sm">

<div th:fragment="review-info-bar" class="flex flex-row flex-wrap text-sm gap-2">
  <a th:if="${reviewType == 'review-solo'}" th:href="@{/members/{username}(username=${review.author.username})}" class="size-6 bg-[#1f282f] rounded-full">
    <img th:if="${review.author.avatar != null}" th:with="imgUrl=${@cloudinaryService.transformAvatar(review.author.username, review.author.avatar, 'MD')}" th:src="${imgUrl}" class="h-6 rounded-full">
  </a>
  <a th:if="${reviewType != 'member'}" th:href="@{/reviews/{id}(id=${review.id})}" class="text-nowrap text-[#667788]">Review by</a>
  <a th:if="${reviewType != 'member'}" th:href="@{/members/{username}(username=${review.author.username})}" th:text="${review.author.username}" class="font-bold text-[#bbccdd]">Author</a>
  <span class="flex flex-row items-center text-[#00c030] *:w-4 *:h-4">
    <th:block th:if="${review.rating >= 1}" th:each="i : ${#numbers.sequence(1, review.rating.intValue())}">
      <svg th:replace="~{fragments/icons :: full-star-ic}"></svg>
    </th:block>
    <span th:if="${review.rating % 1 != 0}" class="self-start">½</span>
  </span>
  <span th:if="${review.liked}" class="flex flex-row items-center *:inline *:size-4 *:text-[#ff9010]">
    <svg th:replace="~{fragments/icons :: like-heart-ic}"></svg>
  </span>
  <a th:if="${reviewType != 'review-solo' and !#lists.isEmpty(review.comments)}" th:href="@{/reviews/{reviewId}#comments(reviewId=${review.id})}" class="flex flex-row items-center gap-1">
    <svg th:replace="~{fragments/icons :: comment-ic}"></svg>
    <span class="text-[#667788]" th:text="${review.comments.size()}"></span>
  </a>
</div>

<div th:fragment="review-content">
  <details th:if="${review.isSpoiler}" class="group mt-2 font-serif text-[#99aabb]">
    <summary class="pointer-events-none italic list-none mb-4">
      <span class="pointer-events-none">This review may contains spoilers. </span>
      <span class="pointer-events-auto cursor-pointer text-[#ddeeff] hover:text-[#40bcf4] group-open:hidden">I can handle the truth.</span>
    </summary>
    <p th:utext="${review.content}">Spoiler content</p>
  </details>
  <p th:unless="${review.isSpoiler}" th:utext="${review.content}" class="font-serif mt-4 text-[#99aabb]">Review content</p>
</div>

<div th:fragment="review-like-bar" class="flex flex-row gap-2 text-sm mt-4">
  <form sec:authorize="isAuthenticated()" th:action="@{/reviews/{id}/{like}(id=${review.id}, like=${#sets.contains(review.likes, #authentication.principal.user)}? unlike : like)}" method="POST">
    <button type="submit" class="flex flex-row gap-1 font-bold cursor-pointer" th:classappend="${#sets.contains(review.likes, #authentication.principal.user)} ? 'text-white' : 'text-[#778899]'">
      <span class="flex flex-row items-center *:inline *:size-4" th:classappend="${#sets.contains(review.likes, #authentication.principal.user)} ? '*:text-[#ff9010]'">
        <svg th:replace="~{fragments/icons :: like-heart-ic}"></svg>
      </span>
      <span th:if="${not #sets.contains(review.likes, #authentication.principal.user)}" class="hover:text-[#aabbcc]">Like review</span>
      <span th:unless="${not #sets.contains(review.likes, #authentication.principal.user)}" class="hover:text-[#aabbcc]">Liked</span>
    </button>
  </form>
  <span sec:authorize="isAnonymous()" class="flex flex-row items-center *:inline *:size-4">
    <svg th:replace="~{fragments/icons :: like-heart-ic}"></svg>
  </span>
  <a th:text="|${review.likes.size()} likes|" class="text-[#778899]"></a>
</div>

<article th:fragment="review (reviewType)" th:with="ser=${review.series}">
  <div class="flex flex-row gap-5 items-start">
    <a th:if="${reviewType} == 'member' or ${reviewType} == 'review-list'" th:href="@{/series/{slug}(slug=${ser.slug})}" class="shrink-0 w-[70px] aspect-17/25 bg-[#1f282f] rounded-sm border shadow-lg/50">
      <img th:replace="~{:: series-poster (${ser}, 'SM')}"/>
    </a>
    <a th:if="${reviewType} == 'review-solo'" th:href="@{/series/{slug}(slug=${ser.slug})}" class="shrink-0 sticky top-3 w-[100px] lg:w-[150px] aspect-17/25 bg-[#1f282f] rounded-sm border shadow-lg/50">
      <img th:replace="~{:: series-poster (${ser}, 'LG')}"/>
    </a>
    <div class="flex flex-col">
      <h2 th:if="${reviewType != 'series'}" class="flex flex-row mb-3 items-end">
        <a th:href="@{/reviews/{id}(id=${review.id})}" th:text="${ser.name}" class="text-2xl font-serif font-bold text-white">Series</a>
        <a th:text="${ser.year}" class="ml-2 text-lg font-light text-[#bbccdd]">Year</a>
      </h2>
      <div th:replace="~{fragments/components :: review-info-bar}"></div>
      <div th:replace="~{fragments/components :: review-content}"></div>
      <div th:replace="~{fragments/components :: review-like-bar}"></div>
    </div>
  </div>
</article>

<article th:fragment="member">
  <div class="flex flex-row gap-5 justify-between">
    <div class="flex flex-row gap-3">
      <a th:href="@{/members/{username}(username=${member.username})}" class="shrink-0 w-10 h-10 bg-[#1f282f] rounded-full">
        <img th:if="${member.avatar != null}" th:with="imgUrl=${@cloudinaryService.transformAvatar(member.username, member.avatar, 'MD')}" th:src="${imgUrl}" class="w-10 h-10 rounded-full">
      </a>
      <div class="flex flex-col">
        <h3>
          <a th:href="@{/members/{username}(username=${member.username})}" th:text="${member.username}" class="font-bold text-white">Username</a>
        </h3>
        <span th:text="|${#sets.size(member.reviews)} reviews|" class="text-xs"></span>
        <span th:text="|${#sets.size(member.followingMembers)} followers|" class="text-xs"></span>
      </div>
    </div>
    <div>
      <form sec:authorize="isAuthenticated()" th:unless="${#authentication.name == member.username}" th:action="@{/members/{username}/unfollow(username=${member.username})}" method="POST" class="flex flex-row gap-3">
        <div th:if="${principalMember != null and @memberService.isFollowing(principalMember.username, member.username)}">
          <input th:formaction="@{/members/{username}/unfollow(username=${member.username})}" type="submit" value="UNFOLLOW" class="px-2 py-1 rounded-sm text-sm font-mono font-bold bg-[#556677] text-[#c8d4e0] inset-shadow-2xs/30 inset-shadow-white hover:text-white hover:bg-[#667788]"/>
        </div>
        <div th:if="${principalMember != null and not @memberService.isFollowing(principalMember.username, member.username)}">
          <input th:formaction="@{/members/{username}/follow(username=${member.username})}" type="submit"value="FOLLOW" class="px-2 py-1 rounded-sm text-sm font-mono font-bold bg-[#556677] text-[#c8d4e0] inset-shadow-2xs/30 inset-shadow-white hover:text-white hover:bg-[#667788]"/>
        </div>
        <span th:if="${principalMember != null and @memberService.isFollowing(member.username, principalMember.username)}">Follows you</span>
      </form>
    </div>
  </div>
</article>

<div th:fragment="series-search-bar (searchType)" class="mt-10 group/search-results">
  <form th:hx-post="@{/series/search(searchType=${searchType})}" hx-target="#search-results" hx-trigger="input changed delay:1s from:#query-box, keyup[key=='Enter'] from:#query-box" hx-swap="innerHTML" class="w-full">
    <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
    <input id="query-box" name="query" type="text" placeholder="Search for a series..." required class="w-full border rounded-sm py-1 px-2 text-[#556677] bg-[#ccddee] focus:bg-white focus:text-[#223344]"/>
  </form>
  <ul id="search-results" class="empty:hidden invisible absolute flex flex-col max-h-[600px] rounded-b-lg rounded-x-lg divide-y overflow-scroll text-white bg-[#667788] group-focus-within/search-results:visible group-hover/search-results:visible z-30"></ul>
</div>

<li th:fragment="series-search-item" th:each="series, iter: ${seriesList}" th:switch="${searchType}">
  <a th:case="'series-home'" th:href="@{/series/{slug}(slug=${series.slug})}" th:autofocus="${iter.first}" class="flex flex-row gap-2 p-2 focus:bg-[#00ac1c] hover:bg-[#445566] active:bg-[#009d1a]">
    <img th:if="${series.image != null}" th:with="imgUrl=${@cloudinaryService.fetchPoster('https://artworks.thetvdb.com' + series.image, 'SM')}" th:src="${imgUrl}" class="object-contain w-[70px] aspect-17/25 rounded-sm border">
    <div class="flex flex-col gap-2">
      <h2 th:text="${series.name}" class="text-lg font-bold"></h2>
      <h3 th:text="${series.year}"></h3>
    </div>
  </a>
  <button th:case="'new-review'" th:hx-get="@{/reviews/new/form(series=${series.slug})}" hx-target="#review-form" hx-swap="innerHTML" th:autofocus="${iter.first}" class="flex flex-row gap-2 p-2 w-full focus:bg-[#00ac1c] hover:bg-[#445566] active:bg-[#009d1a]">
    <img th:if="${series.image != null}" th:with="imgUrl=${@cloudinaryService.fetchPoster('https://artworks.thetvdb.com' + series.image, 'SM')}" th:src="${imgUrl}" class="object-contain w-[70px] aspect-17/25 rounded-sm border">
    <div class="flex flex-col gap-2">
      <h2 th:text="${series.name}" class="text-lg font-bold"></h2>
      <h3 th:text="${series.year}"></h3>
    </div>
  </button>
</li>

<th:block th:with="slug=${series != null} ? ${series.slug}">
  <form action="#" th:fragment="post-review" th:action="@{/series/{slug}(slug=${slug})}" th:object="${postReview}" method="POST" enctype="utf8" >
    <div class="flex flex-col p-2 rounded-sm bg-[#445566]">
      <label class="mb-1 font-bold">What did you think?<a href="#" class="hidden float-end group-target/post-review:block">x</a></label>
      <div class="flex flex-row justify-between mb-2">
        <div>
          <label class="mr-1">Watched on</label>
          <input type="date" id="watchedDate" name="watchedDate" th:field="*{watchedOn}" required/>
        </div>
      </div>
      <textarea id="content" name="content" th:field="*{content}" required rows="5" cols="32" placeholder="Add a review..." class="px-2 py-1 rounded-t-sm bg-[#ccddee] text-[#234] focus:bg-white"></textarea>
      <div class="mb-2 p-2 rounded-b-sm bg-[#667788]">
        <input type="checkbox" th:field="*{isSpoiler}"/>
        <label th:for="isSpoiler" class="ml-1 text-white">Contains spoilers</label>
      </div>
      <div class="flex flex-row justify-between mb-7">
        <div class="flex flex-col">
          <legend class="mb-1 text-white">Rating</legend>
          <fieldset class="flex flex-row-reverse justify-end items-start text-4xl font-mono">
            <input type="radio" name="rating" id="rating5" value="5" required class="peer size-8 cursor-pointer appearance-none"/>
            <label for="rating5" th:insert="~{fragments/icons :: full-star-ic}" class="pointer-events-none text-[#334455] -ms-4 peer-hover:text-[#40bcf4] peer-checked:text-[#00e054] *:absolute *:pr-0 *:shrink-0 *:size-8"></label>
            <input type="radio" name="rating" id="rating4.5" value="4.5" required class="peer w-4 h-8 cursor-pointer appearance-none"/>
            <label for="rating4.5" th:insert="~{fragments/icons :: half-star-ic}" class="pointer-events-none text-[#334455] peer-hover:text-[#40bcf4] peer-checked:text-[#00e054] *:absolute *:pr-0 *:shrink-0 *:size-8"></label>
            <input type="radio" name="rating" id="rating4" value="4" required class="peer size-8 cursor-pointer appearance-none"/>
            <label for="rating4" th:insert="~{fragments/icons :: full-star-ic}" class="pointer-events-none text-[#334455] -ms-4 peer-hover:text-[#40bcf4] peer-checked:text-[#00e054] *:absolute *:pr-0 *:shrink-0 *:size-8"></label>
            <input type="radio" name="rating" id="rating3.5" value="3.5" required class="peer w-4 h-8 cursor-pointer appearance-none"/>
            <label for="rating3.5" th:insert="~{fragments/icons :: half-star-ic}" class="pointer-events-none text-[#334455] peer-hover:text-[#40bcf4] peer-checked:text-[#00e054] *:absolute *:pr-0 *:shrink-0 *:size-8"></label>
            <input type="radio" name="rating" id="rating3" value="3" required class="peer size-8 cursor-pointer appearance-none"/>
            <label for="rating3" th:insert="~{fragments/icons :: full-star-ic}" class="pointer-events-none text-[#334455] -ms-4 peer-hover:text-[#40bcf4] peer-checked:text-[#00e054] *:absolute *:pr-0 *:shrink-0 *:size-8"></label>
            <input type="radio" name="rating" id="rating2.5" value="2.5" required class="peer w-4 h-8 cursor-pointer appearance-none"/>
            <label for="rating2.5" th:insert="~{fragments/icons :: half-star-ic}" class="pointer-events-none text-[#334455] peer-hover:text-[#40bcf4] peer-checked:text-[#00e054] *:absolute *:pr-0 *:shrink-0 *:size-8"></label>
            <input type="radio" name="rating" id="rating2" value="2" required class="peer size-8 cursor-pointer appearance-none"/>
            <label for="rating2" th:insert="~{fragments/icons :: full-star-ic}" class="pointer-events-none text-[#334455] -ms-4 peer-hover:text-[#40bcf4] peer-checked:text-[#00e054] *:absolute *:pr-0 *:shrink-0 *:size-8"></label>
            <input type="radio" name="rating" id="rating1.5" value="1.5" required class="peer w-4 h-8 cursor-pointer appearance-none"/>
            <label for="rating1.5" th:insert="~{fragments/icons :: half-star-ic}" class="pointer-events-none text-[#334455] peer-hover:text-[#40bcf4] peer-checked:text-[#00e054] *:absolute *:pr-0 *:shrink-0 *:size-8"></label>
            <input type="radio" name="rating" id="rating1" value="1" required class="peer size-8 cursor-pointer appearance-none"/>
            <label for="rating1" th:insert="~{fragments/icons :: full-star-ic}" class="pointer-events-none text-[#334455] -ms-4 peer-hover:text-[#40bcf4] peer-checked:text-[#00e054] *:absolute *:pr-0 *:shrink-0 *:size-8"></label>
            <input type="radio" name="rating" id="rating0.5" value="0.5" required class="peer w-4 h-8 cursor-pointer appearance-none"/>
            <label for="rating0.5" th:insert="~{fragments/icons :: half-star-ic}" class="pointer-events-none text-[#334455] peer-hover:text-[#40bcf4] peer-checked:text-[#00e054] *:absolute *:pr-0 *:shrink-0 *:size-8"></label>
          </fieldset>
        </div>
        <div class="flex flex-col justify-center items-center">
          <legend class="text-white">Like</legend>
          <fieldset class="flex">
            <input type="checkbox" name="like" th:field="*{like}" class="peer size-10 appearance-none cursor-pointer"/>
            <label class="pointer-events-none -ms-10 text-[#556677] peer-hover:text-[#ff80e8] peer-checked:text-[#ff9010] *:size-10">
              <svg th:replace="~{fragments/icons :: like-heart-ic}"></svg>
            </label>
          </fieldset>
        </div>
      </div>
      <div class="flex flex-row justify-end"><input type="submit" value="Post review" class="bg-[#00ac1c] hover:bg-[#009d1a] active:bg-[#009318] text-white font-mono font-semibold align-center px-3 py-1 rounded-sm inset-shadow-2xs/30 inset-shadow-white"/></div>
    </div>
  </form>
</th:block>
