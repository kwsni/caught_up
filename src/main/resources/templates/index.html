<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org"
  xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
  <head>
    <title>Caught up!</title>
  </head>
  <body>
    <div th:if="${param.logout} != null">
      <p>
          You have been logged out.
      </p>
    </div>
    <h1 th:inline="text" class="font-bold text-2xl lg:text-6xl">Welcome to Caught Up, <span th:remove="tag" sec:authentication="name">user</span>!</h1>
    <a th:href="@{/reviews}" class="inline-flex p-3 rounded-lg">See Popular Reviews</a>
    <div sec:authorize="isAuthenticated()"><a th:href="@{/post-review}" class="inline-flex p-3 rounded-lg">Post a Review</a></div>
    <div sec:authorize="isAnonymous()"><a th:href="@{/create-account}" class="inline-flex p-3 rounded-lg">Register</a></div>
    <div sec:authorize="isAuthenticated()"><a th:href="@{/logout}" class="inline-flex p-3 rounded-lg">Log out</a></div>
  </body>
</html>
