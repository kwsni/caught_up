spring.application.name=caught_up
spring.profiles.active=test
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.database=2

spring.datasource.url=jdbc:postgresql://${SPRING_DATASOURCE_HOST}:${SPRING_DATASOURCE_PORT}/caught_up_test
spring.datasource.username=${SPRING_DATASOURCE_TEST_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_TEST_PASSWORD}

tvdb.api.api_key=${TVDB_API_KEY}
tvdb.api.base_url=${TVDB_BASE_URL}

spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash-lite

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.generate-ddl=true
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

